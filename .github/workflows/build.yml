name: Florida

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          local-cache: false
          link-to-sdk: true

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: install dependencies
        run: |
          sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
          sudo gem install fpm -v 1.11.0 --no-document
          python3 -m pip install lief graphlib

      - name: build frida for Android (arm64)
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          FRIDA_VERSION: "17.16.0"
        shell: bash
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --recurse-submodules --branch "${FRIDA_VERSION}" https://github.com/frida/frida
          cd frida
          for path in ../patches/*; do
            name=$(basename "$path")
            echo "Apply patches in $path to frida/subprojects/$name"
            ( cd "subprojects/$name" && for p in ../../../patches/"$name"/*.patch; do
                if git am --3way "$p"; then
                  echo "  git am ok: $p"
                else
                  git am --abort 2>/dev/null || true
                  echo "  fallback patch: $p"
                  patch -p1 --forward --fuzz=8 < "$p" || true
                fi
              done )
          done
          cd ..

          mkdir build-android-arm64
          cd build-android-arm64
          ../frida/configure --host=android-arm64
          make
          cd ..

          gzip -kf build-android-arm64/subprojects/frida-core/server/frida-server

      - name: Upload android arm64 frida-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: florida-server-android-arm64
          path: build-android-arm64/subprojects/frida-core/server/frida-server.gz
          if-no-files-found: error
